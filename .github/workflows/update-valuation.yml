name: Update valuation data

on:
  schedule:
    # Runs every Saturday at 02:20 UTC, 10:20 Asia/Shanghai.
    - cron: "20 2 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-valuation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas akshare

      - name: Fetch latest valuation data
        run: |
          python fetch_akshare_valuation.py \
            --output valuation.csv \
            --raw-cache-dir data_cache/akshare_value \
            --start 2015-01-01 \
            --refresh

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update valuation.csv"
          file_pattern: valuation.csv data_cache/akshare_value/*.csv
